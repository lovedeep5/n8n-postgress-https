name: n8n

x-shared-env: &shared-env
  NODE_ENV: production
  N8N_ENCRYPTION_KEY: ${ENCRYPTION_KEY}
  DB_TYPE: postgresdb
  DB_POSTGRESDB_HOST: postgres
  DB_POSTGRESDB_PORT: 5432
  DB_POSTGRESDB_DATABASE: n8n
  DB_POSTGRESDB_USER: n8n
  DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
  EXECUTIONS_MODE: queue
  QUEUE_BULL_REDIS_HOST: redis
  QUEUE_BULL_REDIS_PORT: 6379
  QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
  TZ: ${TZ}
  GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
  EXECUTIONS_DATA_PRUNE: "true"
  EXECUTIONS_DATA_PRUNE_MAX_COUNT: 10000
  EXECUTIONS_DATA_MAX_AGE: 336
  EXECUTIONS_DATA_PRUNE_HARD_DELETE_INTERVAL: 15
  N8N_LOG_LEVEL: info
  N8N_DIAGNOSTICS_ENABLED: "false"
  N8N_DEFAULT_BINARY_DATA_MODE: filesystem
  N8N_PAYLOAD_SIZE_MAX: 16

services:
  postgres:
    image: postgres:16-alpine
    container_name: n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: n8n
      TZ: ${TZ}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - n8n

  redis:
    image: redis:7-alpine
    container_name: n8n-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --save 60 1000
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - n8n

  n8n:
    image: docker.n8n.io/n8nio/n8n:${N8N_VERSION:-latest}
    pull_policy: always
    container_name: n8n-main
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *shared-env
      N8N_HOST: ${SUB_DOMAIN}.${DOMAIN}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://${SUB_DOMAIN}.${DOMAIN}/
      N8N_EDITOR_BASE_URL: https://${SUB_DOMAIN}.${DOMAIN}/
      N8N_METRICS: "true"
      N8N_METRICS_INCLUDE_QUEUE_METRICS: "true"
      OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS: "true"
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider -q http://localhost:5678/healthz || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - n8n

  n8n-worker:
    image: docker.n8n.io/n8nio/n8n:${N8N_VERSION:-latest}
    pull_policy: always
    restart: unless-stopped
    command: worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *shared-env
      N8N_CONCURRENCY_PRODUCTION_LIMIT: 5
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - n8n

  caddy:
    image: caddy:latest
    pull_policy: always
    container_name: n8n-caddy
    restart: unless-stopped
    depends_on:
      n8n:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./n8n-queue/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    networks:
      - n8n

volumes:
  postgres_data:
  redis_data:
  n8n_data:
  caddy_data:

networks:
  n8n:
    driver: bridge